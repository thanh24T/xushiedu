build:
  gpu: true
  python_version: "3.10"
  cuda: "12.1"
  python_packages:
    - "torch==2.1.0"
    - "transformers==4.35.0"
    - "peft==0.6.2"
    - "accelerate==0.24.1"
    - "bitsandbytes==0.41.2"
    - "scipy"
    - "numpy<2"
    - "huggingface-hub"
  run:
    - "python -c \"from huggingface_hub import snapshot_download; snapshot_download('unsloth/llama-3-8b-Instruct-bnb-4bit'); snapshot_download('SDSD124/xushiedu-llama3-8b-lora')\""

predict: "predict.py:Predictor"
